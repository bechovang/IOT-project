; PlatformIO Project Configuration File for ESP32 MAX98357A I2S Test

[env:esp32dev]
; Ghim platform espressif32 6.x (Arduino core 2.x) de dung duoc driver/i2s.h (legacy).
; Neu de "espressif32" (8.x / Arduino 3.x) se bao loi khi build voi driver/i2s.h.
platform = espressif32@6.9.0
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 115200
